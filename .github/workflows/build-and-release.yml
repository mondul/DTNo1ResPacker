name: Build and (conditionally) Release

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  detect_version_change:
    name: Detect version.txt change
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.getver.outputs.version }}
      changed: ${{ steps.changed.outputs.changed }}
      tag: ${{ steps.getver.outputs.tag }}
    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version.txt
        id: getver
        shell: bash
        run: |
          if [ ! -f version.txt ]; then
            echo "version.txt not found" >&2
            exit 1
          fi
          ver="$(cat version.txt | tr -d '\r' | tr -d '\n' | xargs)"
          if [ -z "$ver" ]; then
            echo "version.txt is empty" >&2
            exit 1
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "tag=v$ver" >> "$GITHUB_OUTPUT"

      - name: Did version.txt change in this push?
        id: changed
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          # If this is the first push on a new branch, BEFORE can be all zeros.
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Ensure both commits exist locally
          git cat-file -e "$BEFORE^{commit}" 2>/dev/null || git fetch --no-tags origin "$BEFORE" --depth=1
          git cat-file -e "$AFTER^{commit}" 2>/dev/null || git fetch --no-tags origin "$AFTER" --depth=1

          if git diff --name-only "$BEFORE" "$AFTER" | grep -qx "version.txt"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build (${{ matrix.name }})
    needs: detect_version_change
    if: needs.detect_version_change.outputs.changed == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            arch: x64
          - name: macos-x64
            os: macos-15-intel
            arch: x64
          - name: macos-arm64
            os: macos-latest
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (CMake)
        shell: bash
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build
        shell: bash
        run: |
          cmake --build build --config Release -j

      # Package: zip all executables we built (common names), without assuming install rules.
      - name: Package artifacts (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.detect_version_change.outputs.version }}"
          OUTDIR="dist"
          mkdir -p "$OUTDIR"

          # Common CMake output locations
          CANDIDATES=(
            "build/DTNo1ResPacker"
            "build/Release/DTNo1ResPacker"
          )

          FOUND=0
          STAGE="stage_${{ matrix.name }}"
          rm -rf "$STAGE"
          mkdir -p "$STAGE"

          for f in "${CANDIDATES[@]}"; do
            if [ -f "$f" ] && [ -x "$f" ]; then
              cp "$f" "$STAGE/"
              FOUND=1
            fi
          done

          if [ "$FOUND" -ne 1 ]; then
            echo "No expected binaries found. Listing build dir:"
            ls -R build || true
            exit 1
          fi

          ZIPNAME="DTNo1ResPacker-v${VERSION}-${{ matrix.name }}.zip"
          (cd "$STAGE" && zip -9 "../$OUTDIR/$ZIPNAME" ./*)

          echo "Created $OUTDIR/$ZIPNAME"
          ls -l "$OUTDIR"

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Version = "${{ needs.detect_version_change.outputs.version }}"

          # Prefer Release output, fallback to non-config path
          $Candidates = @(
            'build/Release/DTNo1ResPacker.exe',
            'build/DTNo1ResPacker.exe'
          )

          $Bin = $null
          foreach ($c in $Candidates) {
            if (Test-Path $c) { $Bin = $c; break }
          }

          if (-not $Bin) {
            Write-Host "Expected binary not found. Listing build dir:"
            Get-ChildItem -Recurse build | Select-Object FullName
            exit 1
          }

          New-Item -ItemType Directory -Force -Path dist | Out-Null

          $Stage = "stage_${{ matrix.name }}"
          if (Test-Path $Stage) { Remove-Item -Recurse -Force $Stage }
          New-Item -ItemType Directory -Force -Path $Stage | Out-Null

          Copy-Item $Bin -Destination (Join-Path $Stage 'DTNo1ResPacker.exe')

          $Zip = "DTNo1ResPacker-v$Version-${{ matrix.name }}.zip"
          $ZipPath = Join-Path 'dist' $Zip
          if (Test-Path $ZipPath) { Remove-Item -Force $ZipPath }

          Compress-Archive -Path (Join-Path $Stage '*') -DestinationPath $ZipPath -CompressionLevel Optimal
          Write-Host "Created $ZipPath"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/*.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release (only if version.txt changed)
    needs: [detect_version_change, build]
    if: needs.detect_version_change.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Ensure zip files exist
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=(artifacts/**/*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No zip files found under artifacts/" >&2
            exit 1
          fi
          printf "Found:\n%s\n" "${files[@]}"

      - name: Create/Update Release and upload zips
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect_version_change.outputs.tag }}
          name: ${{ needs.detect_version_change.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
